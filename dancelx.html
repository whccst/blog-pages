<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI显示</title>
</head>
<body>

<div id="box">加载中...</div>
<div>请输入密钥：
<input id="token" type="password">
</div>
<div>
<textarea id="note" rows="5" cols="50"></textarea>
<button id="btn_search" type="button" onclick="load()" name="button">查询</button></div>
<script>
async function load() {
const element = document.getElementById("box");
element.innerText = "查询中，请稍等...";
  const value=document.getElementById('token').value;
const content=document.getElementById('note').value;
  const res = await fetch(`/api?trust_key=${value}&info=${content}`); // 你的 Worker 地址
  const data = await res.text();

  

  // 👉 就写在这里
  element.innerText = data;
}
</script>

</body>
</html>
