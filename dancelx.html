<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI显示</title>
</head>
<body>

<div id="box">加载中...</div>
<div ><input id="token" type="text">
<button id="btn_search" type="button" onclick="load()" name="button">请输入密钥</button></div>
<script>
async function load() {
  const value=document.getElementById('token').value;
  const res = await fetch(`/api?trust_key=${value}&info=hello`); // 你的 Worker 地址
  const data = await res.json();

  const element = document.getElementById("box");

  // 👉 就写在这里
  element.innerText = data.text;
}
</script>

</body>
</html>
