<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI显示</title>
</head>
<body>

<div id="box">加载中...</div>

<script>
async function load() {
  const res = await fetch("/api?trust_key=123&info=hello"); // 你的 Worker 地址
  const data = await res.text();

  const element = document.getElementById("box");

  // 👉 就写在这里
  element.innerText = data.text;
}

load();
</script>

</body>
</html>
